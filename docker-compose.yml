services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173,http://127.0.0.1:80
    volumes:
      - ./backend/models:/app/backend/models
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
